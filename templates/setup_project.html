{% extends "base.html" %}

{% block content %}
<!-- Wrapper: flex-grow fills the gap between Nav and Footer. items-center centers vertical. -->
<div class="flex-grow flex items-center justify-center bg-gray-50 py-6 px-4">
    <div class="w-full max-w-lg bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-gray-100">

        <!-- Progress Bar -->
        <div class="flex items-center justify-center mb-8 space-x-2">
            <!-- Step 1: Register -->
            <div class="w-8 md:w-10 h-1.5 bg-green-500 rounded-full"></div>
            <!-- Step 2: Payment -->
            <div class="w-8 md:w-10 h-1.5 bg-green-500 rounded-full"></div>
            <!-- Step 3: Setup (Active) -->
            <div class="w-8 md:w-10 h-1.5 bg-blue-600 rounded-full shadow-sm shadow-blue-200 animate-pulse"></div>
        </div>

        <div class="text-center mb-6">
            <div
                class="w-12 h-12 md:w-14 md:h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                    </path>
                </svg>
            </div>
            <h1 class="text-xl md:text-2xl font-bold text-slate-900">Name your Workspace</h1>
            <p class="text-slate-500 mt-1 text-sm">Create a home for your documents.</p>
        </div>

        <form method="POST" action="{{ url_for('auth.create_workspace') }}" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Workspace Name</label>
                <input type="text" name="project_name" placeholder="e.g. Acme Corp Finance"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-base placeholder-gray-300"
                    required>
            </div>

            <button type="submit"
                class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition shadow-lg shadow-slate-900/20">
                {% if not current_user.has_used_trial %}
                Create Trial Workspace
                {% else %}
                Continue to Payment
                {% endif %}
            </button>
        </form>
    </div>
</div>
{% endblock %}
