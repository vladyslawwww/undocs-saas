{% extends "base.html" %}

{% block content %}
<div class="flex-grow flex items-center justify-center bg-gray-50 px-4">
    <div class="w-full max-w-md bg-white p-10 rounded-2xl shadow-sm border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-900">Join Workspace</h1>
            <p class="text-slate-500 mt-2">Enter the code shared by your co-worker.</p>
        </div>

        <form method="POST" action="{{ url_for('auth.join_workspace') }}">
            <div class="mb-6">
                <input type="text" name="invite_code" placeholder="e.g. 8x92ka1" required 
                       class="w-full text-center text-2xl font-mono px-4 py-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-500 outline-none uppercase tracking-widest">
            </div>
            
            <button type="submit" class="w-full bg-purple-600 text-white font-bold py-3.5 rounded-xl hover:bg-purple-700 transition shadow-lg shadow-purple-100">
                Join Now
            </button>
        </form>
        
        <div class="mt-6 text-center">
            {% if current_user.memberships %}
                <!-- Existing User: Go to Dashboard -->
                <a href="{{ url_for('main.dashboard') }}" class="text-slate-400 hover:text-slate-600 text-sm transition flex items-center justify-center gap-1">
                    Back to Dashboard
                </a>
            {% else %}
                <!-- New User: Go to Onboarding Choice -->
                <a href="{{ url_for('auth.onboarding_choice') }}" class="text-slate-400 hover:text-slate-600 text-sm transition">
                    Back
                </a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
